<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QA Attainment Tool v6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; border-bottom: 2px solid #e8f0fe; padding-bottom: 10px; }
        .section { margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; color: #444; }
        textarea, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        textarea { height: 100px; font-family: monospace; font-size: 12px; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        button:hover { background: #1557b0; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; }
        .copy-btn { background: #34a853; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>QA Daily Attainment Tool v6</h2>
    
    <div class="section">
        <label>1. Target Date (Type it like: 4/16/2026)</label>
        <input type="text" id="targetDate" placeholder="M/D/YYYY">
    </div>

    <div class="section">
        <label>2. Weekly Target Schedule</label>
        <textarea id="targetInput" placeholder="Hossam: 13 sampling Reservation + 8 uni sampling + 5 Sales Validation..."></textarea>
    </div>

    <div class="section">
        <label>3. Upload Excel Export</label>
        <input type="file" id="fileInput" accept=".xlsx, .xls">
    </div>

    <button onclick="processExcel()">Generate Final Table</button>

    <div id="resultArea" style="display:none;">
        <table id="finalTable">
            <thead>
                <tr><th>QAA</th><th>Assigned</th><th>Attainment</th><th>Missing</th><th>Comment</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
        <button class="copy-btn" onclick="copyTable()">Copy Table for Email</button>
    </div>
</div>

<script>
    let excelData = [];

    // UPDATED INDICES
    const COL_ID = 6;       // Column G
    const COL_DATE = 19;     // Column T (Index 19)
    const COL_ACTIVITY = 21; // Column V
    const COL_LOB = 26;      // Column AA
    const COL_AGENTLOC = 27; // Column AB

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(evt) {
            const data = evt.target.result;
            const workbook = XLSX.read(data, {type: 'binary', cellDates: true});
            excelData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
            alert("Excel data ready!");
        };
        reader.readAsBinaryString(file);
    });

    function processExcel() {
        const inputDate = document.getElementById('targetDate').value.trim();
        const targetRaw = document.getElementById('targetInput').value;
        
        if (!excelData.length) return alert("Please upload the file first!");

        let stats = {
            "5511496": { name: "Hossam", res: 0, uni: 0, sales: 0, short: 0, voc: 0 },
            "5811570": { name: "Bassam", res: 0, uni: 0, sales: 0, short: 0, voc: 0 },
            "6024482": { name: "Omar", res: 0, uni: 0, sales: 0, short: 0, voc: 0 }
        };

        let matchCount = 0;

        for(let i = 1; i < excelData.length; i++) {
            const row = excelData[i];
            let rowDateRaw = row[COL_DATE];
            let rowDateStr = "";

            // Better Date Conversion
            if (rowDateRaw instanceof Date) {
                rowDateStr = (rowDateRaw.getMonth() + 1) + "/" + rowDateRaw.getDate() + "/" + rowDateRaw.getFullYear();
            } else {
                rowDateStr = String(rowDateRaw || "").trim();
            }

            if (rowDateStr === inputDate) {
                matchCount++;
                const id = String(row[COL_ID] || "").trim();
                const activity = String(row[COL_ACTIVITY] || "").trim();
                const lob = String(row[COL_LOB] || "").trim();
                const loc = String(row[COL_AGENTLOC] || "").trim();

                if (stats[id]) {
                    if (lob.includes("Reservation")) stats[id].res++;
                    if (lob.includes("Universal")) stats[id].uni++;
                    if (activity.includes("- Sales")) stats[id].sales++;
                    if (activity.includes("- Short")) stats[id].short++;
                    if (loc.includes("Capture Customer Feedback")) stats[id].voc++;
                }
            }
        }

        if (matchCount === 0) return alert("Date '" + inputDate + "' not found in Column T. Check your format!");

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        const targetLines = targetRaw.split('\n');
        Object.keys(stats).forEach(id => {
            const qaa = stats[id];
            let assignedLine = targetLines.find(l => l.includes(qaa.name)) || qaa.name + ": 0 Res + 0 Uni + 0 Sales";
            let assigned = assignedLine.includes(":") ? assignedLine.split(":")[1].trim() : assignedLine;

            // Generate Strings
            let attainment = `${qaa.res} Sampling Reservation + ${qaa.uni} Uni sampling + ${qaa.sales} Sales Validation`;
            if (qaa.short > 0) attainment += ` + ${qaa.short} Short`;
            if (qaa.voc > 0) attainment += ` + ${qaa.voc} VOC`;

            // Simple Missing Calculation logic
            let tRes = (assigned.match(/(\d+)\s+sampling Reservation/) || [0,0])[1];
            let tUni = (assigned.match(/(\d+)\s+uni/) || [0,0])[1];
            let tSales = (assigned.match(/(\d+)\s+Sales/) || [0,0])[1];
            
            let mArr = [];
            if (tRes - qaa.res > 0) mArr.push((tRes - qaa.res) + " Res");
            if (tUni - qaa.uni > 0) mArr.push((tUni - qaa.uni) + " Uni");
            if (tSales - qaa.sales > 0) mArr.push((tSales - qaa.sales) + " Sales");
            let missing = mArr.length > 0 ? mArr.join(" + ") : "-";

            tbody.innerHTML += `<tr>
                <td><strong>${qaa.name}</strong></td>
                <td>${assigned}</td>
                <td>${attainment}</td>
                <td>${missing}</td>
                <td>-</td>
            </tr>`;
        });

        document.getElementById('resultArea').style.display = 'block';
    }

    function copyTable() {
        const range = document.createRange();
        range.selectNode(document.getElementById("finalTable"));
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand("copy");
        alert("Table copied!");
    }
</script>

</body>
</html>
