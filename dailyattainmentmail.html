<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QA Attainment Tool v8</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 12px; }
        .section { margin-bottom: 20px; }
        textarea, input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        textarea { height: 180px; font-family: monospace; font-size: 11px; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h2>QA Daily Attainment Tool v8</h2>
    
    <div class="section">
        <label>1. Target Date (Try typing just the number, e.g., 15)</label>
        <input type="text" id="targetDate" placeholder="e.g., 15">
    </div>

    <div class="section">
        <label>2. Weekly Target Schedule (Paste the grid)</label>
        <textarea id="targetInput" placeholder="Paste grid here..."></textarea>
    </div>

    <div class="section">
        <label>3. Upload Excel Export</label>
        <input type="file" id="fileInput" accept=".xlsx, .xls">
    </div>

    <button onclick="processData()">Generate Report</button>

    <div id="resultArea" style="display:none;">
        <table id="finalTable">
            <thead>
                <tr><th>QAA</th><th>Assigned</th><th>Attainment</th><th>Missing</th><th>Comment</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let excelData = [];
    const COL_ID = 6, COL_DATE = 19, COL_ACTIVITY = 21, COL_LOB = 26, COL_AGENTLOC = 27;

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(evt) {
            const data = evt.target.result;
            const workbook = XLSX.read(data, {type: 'binary', cellDates: true});
            excelData = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
            alert("Excel export loaded!");
        };
        reader.readAsBinaryString(file);
    });

    function processData() {
        const inputDate = document.getElementById('targetDate').value.trim();
        const targetRaw = document.getElementById('targetInput').value;
        
        // 1. IMPROVED GRID PARSING
        const rows = targetRaw.split('\n').map(r => r.split(/\t| {2,}/)); // Split by tab OR multiple spaces
        
        // Find the date row (the one containing "Apr")
        let dateRowIndex = rows.findIndex(r => r.join('').includes('Apr'));
        if (dateRowIndex === -1) return alert("Could not find a row with 'Apr' in your pasted target.");
        
        const dateRow = rows[dateRowIndex].map(cell => cell.trim());
        
        // Fuzzy Search for the Date
        let dateIndex = dateRow.findIndex(cell => cell.includes(inputDate));
        
        if (dateIndex === -1) {
            alert("Found these dates in header: [" + dateRow.join(", ") + "]. None matched '" + inputDate + "'.");
            return;
        }

        const getAssigned = (name) => {
            let pRow = rows.find(r => r[0] && r[0].trim().toLowerCase() === name.toLowerCase());
            return pRow ? pRow[dateIndex] : "OFF";
        };

        // 2. AGGREGATE EXPORT
        let stats = {
            "5511496": { name: "Hossam", res: 0, uni: 0, sales: 0, short: 0, voc: 0 },
            "5811570": { name: "Bassam", res: 0, uni: 0, sales: 0, short: 0, voc: 0 },
            "6024482": { name: "Omar", res: 0, uni: 0, sales: 0, short: 0, voc: 0 }
        };

        excelData.forEach((row, i) => {
            if (i === 0) return;
            let dRaw = row[COL_DATE];
            let dStr = (dRaw instanceof Date) ? dRaw.getDate().toString() : String(dRaw || "");
            
            // Match export date to input number (e.g., if export is 4/15/2026, match "15")
            if (dStr.includes(inputDate)) {
                const id = String(row[COL_ID] || "").trim();
                if (stats[id]) {
                    const act = String(row[COL_ACTIVITY] || ""), lob = String(row[COL_LOB] || ""), loc = String(row[COL_AGENTLOC] || "");
                    if (lob.includes("Reservation")) stats[id].res++;
                    if (lob.includes("Universal")) stats[id].uni++;
                    if (act.includes("- Sales")) stats[id].sales++;
                    if (act.includes("- Short")) stats[id].short++;
                    if (loc.includes("Capture Customer Feedback")) stats[id].voc++;
                }
            }
        });

        // 3. RENDER
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        Object.keys(stats).forEach(id => {
            const qaa = stats[id];
            const assigned = getAssigned(qaa.name);
            let attainment = `${qaa.res} Res + ${qaa.uni} Uni + ${qaa.sales} Sales`;
            if (qaa.short > 0) attainment += ` + ${qaa.short} Short`;
            if (qaa.voc > 0) attainment += ` + ${qaa.voc} VOC`;

            let tRes = (assigned.match(/(\d+)\s+sampling Reservation/) || [0,0])[1];
            let tUni = (assigned.match(/(\d+)\s+uni/) || [0,0])[1];
            let tSales = (assigned.match(/(\d+)\s+Sales/) || [0,0])[1];
            
            let mArr = [];
            if (tRes - qaa.res > 0) mArr.push((tRes - qaa.res) + " Res");
            if (tUni - qaa.uni > 0) mArr.push((tUni - qaa.uni) + " Uni");
            if (tSales - qaa.sales > 0) mArr.push((tSales - qaa.sales) + " Sales");

            tbody.innerHTML += `<tr>
                <td><strong>${qaa.name}</strong></td>
                <td>${assigned}</td>
                <td>${assigned.includes("OFF") || assigned.includes("Training") ? assigned : attainment}</td>
                <td>${mArr.length > 0 ? mArr.join(" + ") : "-"}</td>
                <td>-</td>
            </tr>`;
        });
        document.getElementById('resultArea').style.display = 'block';
    }
</script>
</body>
</html>
