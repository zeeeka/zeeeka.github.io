<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QA Attainment Tool v5 - Debug Mode</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .section { margin-bottom: 15px; padding: 10px; border-bottom: 1px solid #eee; }
        textarea, input { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
    </style>
</head>
<body>

<div class="container">
    <h2>QA Attainment v5 (Debug Enabled)</h2>
    
    <div class="section">
        <label>1. Target Date (Type it EXACTLY as it looks in Excel, e.g. 4/15/2026 or 15-Apr-26)</label>
        <input type="text" id="targetDate" placeholder="M/D/YYYY">
    </div>

    <div class="section">
        <label>2. Weekly Target Schedule</label>
        <textarea id="targetInput" placeholder="Hossam: 13 sampling Reservation..."></textarea>
    </div>

    <div class="section">
        <label>3. Upload Excel Export</label>
        <input type="file" id="fileInput" accept=".xlsx, .xls">
    </div>

    <button onclick="processExcel()">Generate Table</button>

    <div id="resultArea" style="display:none;">
        <h3>Final Email Table</h3>
        <table id="finalTable">
            <thead>
                <tr><th>QAA</th><th>Assigned</th><th>Attainment</th><th>Missing</th><th>Comment</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let excelData = [];

    // FIXED INDICES BASED ON YOUR LIST (0-based)
    const COL_ID = 6;      // G
    const COL_DATE = 16;    // Q
    const COL_LOB = 26;     // AA
    const COL_ACTIVITY = 21;// V
    const COL_AGENTLOC = 27;// AB (VOC)

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = function(evt) {
            const data = evt.target.result;
            const workbook = XLSX.read(data, {type: 'binary', cellDates: true});
            const firstSheet = workbook.SheetNames[0];
            excelData = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheet], {header: 1});
            alert("File loaded! Found " + excelData.length + " rows.");
        };
        reader.readAsBinaryString(file);
    });

    function processExcel() {
        const targetDate = document.getElementById('targetDate').value.trim();
        const targetRaw = document.getElementById('targetInput').value;
        
        if (!excelData.length) return alert("Upload file first!");

        let stats = {
            "5511496": { name: "Hossam", res: 0, uni: 0, sales: 0, short: 0, voc: 0 },
            "5811570": { name: "Bassam", res: 0, uni: 0, sales: 0, short: 0, voc: 0 },
            "6024482": { name: "Omar", res: 0, uni: 0, sales: 0, short: 0, voc: 0 }
        };

        let foundDateCount = 0;

        for(let i = 1; i < excelData.length; i++) {
            const row = excelData[i];
            
            // DATE CHECK
            let rawRowDate = row[COL_DATE];
            let formattedRowDate = "";
            
            if (rawRowDate instanceof Date) {
                formattedRowDate = (rawRowDate.getMonth()+1) + "/" + rawRowDate.getDate() + "/" + rawRowDate.getFullYear();
            } else {
                formattedRowDate = String(rawRowDate || "").trim();
            }

            if (formattedRowDate === targetDate) {
                foundDateCount++;
                const rowID = String(row[COL_ID] || "").trim();
                const rowLOB = String(row[COL_LOB] || "").trim();
                const rowActivity = String(row[COL_ACTIVITY] || "").trim();
                const rowAgentLoc = String(row[COL_AGENTLOC] || "").trim();

                if (stats[rowID]) {
                    if (rowLOB.includes("Reservation")) stats[rowID].res++;
                    if (rowLOB.includes("Universal")) stats[rowID].uni++;
                    if (rowActivity.includes("- Sales")) stats[rowID].sales++;
                    if (rowActivity.includes("- Short")) stats[rowID].short++;
                    if (rowAgentLoc.includes("Capture Customer Feedback")) stats[rowID].voc++;
                }
            }
        }

        if (foundDateCount === 0) {
            alert("Match Error: I found 0 rows for the date '" + targetDate + "'. Check your date format!");
            return;
        }

        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        
        Object.keys(stats).forEach(id => {
            const qaa = stats[id];
            // Simple display logic
            tbody.innerHTML += `<tr>
                <td>**${qaa.name}**</td>
                <td>Pasted Targets</td>
                <td>${qaa.res} Res, ${qaa.uni} Uni, ${qaa.sales} Sales, ${qaa.short} Short, ${qaa.voc} VOC</td>
                <td>Calculated Missing</td>
                <td>-</td>
            </tr>`;
        });

        document.getElementById('resultArea').style.display = 'block';
    }
</script>
</body>
</html>
